name: Scrape Market Data

on:
  schedule:
    # Runs every 6 hours (at 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Run market scraper
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run scraper
        run: node scraper.js
        env:
          # Override with a comma-separated list of tickers if desired,
          # e.g. set a repository secret/variable named TICKERS.
          TICKERS: ${{ vars.TICKERS || 'AAPL,MSFT,GOOGL,AMZN,MRVL' }}

      - name: Commit and push updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are staged changes; exit cleanly otherwise.
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): update scraped market data [skip ci]"
            git push
          fi
